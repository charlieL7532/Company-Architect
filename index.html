<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Architect</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e1e28;
    color: #fff;
    font-family: Arial, sans-serif;
    min-height: 100vh;
  }

  .screen { display: none; padding: 30px 20px; max-width: 750px; margin: 0 auto; }
  .screen.active { display: block; }

  h1 { color: #ffd700; font-size: 28px; text-align: center; margin-bottom: 24px; }
  h2 { color: #ffd700; font-size: 20px; margin-bottom: 16px; }

  .subtitle { color: #aaa; text-align: center; margin-bottom: 20px; font-size: 15px; }

  /* Buttons */
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
  }
  .btn-green  { background: #00a050; }
  .btn-blue   { background: #3264b4; }
  .btn-orange { background: #c85000; }
  .btn-grey   { background: #505058; }
  .btn-red    { background: #a01e1e; }
  .btn:hover  { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-full { width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }

  /* Type buttons */
  .type-btn-row { display: flex; gap: 12px; justify-content: center; margin: 16px 0; }
  .type-btn {
    padding: 10px 28px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    border: 3px solid transparent;
  }
  .type-btn.tech     { background: #007ac8; }
  .type-btn.clothing { background: #9632b4; }
  .type-btn.food     { background: #c85000; }
  .type-btn.selected { border-color: #fff; }

  /* Input */
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    background: #2d2d3c;
    border: 1px solid #555;
    border-radius: 6px;
    color: #fff;
    font-size: 15px;
    margin: 8px 0;
  }
  select {
    padding: 10px 14px;
    background: #2d2d3c;
    border: 1px solid #555;
    border-radius: 6px;
    color: #fff;
    font-size: 15px;
    width: 100%;
    margin: 8px 0;
  }
  label { font-size: 14px; color: #ccc; display: block; margin-top: 10px; }

  .error { color: #f55; font-size: 14px; margin-top: 8px; text-align: center; }

  /* Stats bar */
  .stats-bar {
    background: #2d2d3c;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 14px;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-label { color: #aaa; font-size: 12px; }
  .stat-value { color: #fff; font-weight: bold; font-size: 16px; }
  .stat-value.money { color: #ffd700; }

  /* Menu grid */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
  }
  .menu-btn {
    padding: 18px;
    border-radius: 8px;
    background: #3264b4;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    text-align: center;
  }
  .menu-btn:hover { background: #4274c4; }
  .menu-btn.end-turn { background: #c85000; }
  .menu-btn.end-turn:hover { background: #d86010; }

  /* Cards */
  .card {
    background: #2d2d3c;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card-info { font-size: 14px; color: #ddd; line-height: 1.6; }
  .card-info strong { color: #fff; font-size: 15px; }
  .badge {
    background: #ffd700;
    color: #222;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .badge-red { background: #f55; color: #fff; }

  /* Turn summary */
  .summary-box {
    background: #2d2d3c;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 2;
  }
  .summary-row { display: flex; justify-content: space-between; }
  .summary-row.positive { color: #5d5; }
  .summary-row.negative { color: #f77; }
  .summary-row.total { color: #ffd700; font-weight: bold; font-size: 15px; border-top: 1px solid #555; padding-top: 8px; margin-top: 4px; }

  /* Production rows */
  .prod-row {
    background: #2d2d3c;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .prod-row h3 { color: #ffd700; margin-bottom: 8px; font-size: 15px; }
  .prod-inputs { display: flex; gap: 12px; flex-wrap: wrap; }
  .prod-inputs > div { flex: 1; min-width: 140px; }

  .back-btn-row { margin-top: 16px; }

  /* Game over */
  .gameover-box { text-align: center; padding: 40px 20px; }
  .gameover-box h1 { font-size: 48px; margin-bottom: 16px; }
  .gameover-box.win h1 { color: #ffd700; }
  .gameover-box.lose h1 { color: #f55; }
  .gameover-stats { color: #aad4ff; font-size: 16px; line-height: 2; margin: 20px 0; }

  .turn-label {
    text-align: center;
    color: #aaa;
    font-size: 14px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <h1>Company Architect</h1>
  <p class="subtitle">Build your company and reach £1,000,000</p>

  <p style="text-align:center; margin-bottom:8px; color:#ccc;">Choose your business type:</p>
  <div class="type-btn-row">
    <button class="type-btn tech"     onclick="selectType('tech',this)">Tech</button>
    <button class="type-btn clothing" onclick="selectType('clothing',this)">Clothing</button>
    <button class="type-btn food"     onclick="selectType('food',this)">Food</button>
  </div>

  <div style="max-width:400px; margin: 0 auto;">
    <label>Company name:</label>
    <input type="text" id="company-name" placeholder="Enter your company name">
    <div id="start-error" class="error"></div>
    <button class="btn btn-green btn-full" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- MENU SCREEN -->
<div id="screen-menu" class="screen">
  <div class="turn-label" id="turn-label">Turn 1</div>
  <h1 id="menu-company-name">Your Company</h1>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="menu-grid">
    <button class="menu-btn" onclick="showScreen('launch')">Launch Product</button>
    <button class="menu-btn" onclick="showScreen('hire')">Hire Employees</button>
    <button class="menu-btn" onclick="showScreen('buyfacility')">Buy Facility</button>
    <button class="menu-btn" onclick="showScreen('upgrade')">Upgrade Facility</button>
    <button class="menu-btn" onclick="showScreen('invest')">Invest</button>
    <button class="menu-btn end-turn" onclick="showScreen('endturn')">End Turn</button>
  </div>
</div>

<!-- LAUNCH SCREEN -->
<div id="screen-launch" class="screen">
  <h2>Launch Product</h2>
  <div id="launch-content"></div>
  <div class="back-btn-row">
    <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>
  </div>
</div>

<!-- HIRE SCREEN -->
<div id="screen-hire" class="screen">
  <h2>Hire Employees</h2>
  <div id="hire-content"></div>
  <div class="back-btn-row">
    <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>
  </div>
</div>

<!-- BUY FACILITY SCREEN -->
<div id="screen-buyfacility" class="screen">
  <h2>Buy New Facility</h2>
  <div id="buyfacility-content"></div>
  <div class="back-btn-row">
    <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>
  </div>
</div>

<!-- UPGRADE SCREEN -->
<div id="screen-upgrade" class="screen">
  <h2>Upgrade Facility — Cost: £10,000 each</h2>
  <div id="upgrade-content"></div>
  <div class="back-btn-row">
    <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>
  </div>
</div>

<!-- INVEST SCREEN -->
<div id="screen-invest" class="screen">
  <h2>Investments</h2>
  <div id="invest-content"></div>
  <div class="back-btn-row">
    <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>
  </div>
</div>

<!-- END TURN SCREEN -->
<div id="screen-endturn" class="screen">
  <h2 id="endturn-title">Set Production</h2>
  <div id="endturn-content"></div>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-gameover" class="screen">
  <div id="gameover-content"></div>
</div>

<script>
// ============================================================
// GAME STATE
// ============================================================
let state = {};

function newGame() {
  state = {
    turn: 1,
    money: 0,
    businessType: '',
    companyName: '',
    facilities: [],
    activeProducts: [],
    investments: [],
    investmentDefs: []
  };
}

// ============================================================
// BUSINESS DEFINITIONS
// ============================================================
const BUSINESS_DEFS = {
  tech: {
    startMoney: 85000,
    salaryMult: 1.2,
    investLuck: 'low',
    products: [
      { name: 'Smartphone',     cost: 800,  market: 1299 },
      { name: 'Laptop',         cost: 1100, market: 1799 },
      { name: 'Smart Watch',    cost: 200,  market: 449  },
      { name: 'Gaming Console', cost: 400,  market: 649  },
      { name: 'VR Headset',     cost: 900,  market: 1499 }
    ]
  },
  clothing: {
    startMoney: 95000,
    salaryMult: 1.0,
    investLuck: 'medium',
    products: [
      { name: 'T-Shirt',    cost: 15, market: 45  },
      { name: 'Jeans',      cost: 40, market: 60  },
      { name: 'Sweatpants', cost: 30, market: 60  },
      { name: 'Hoodie',     cost: 35, market: 90  },
      { name: 'Coat',       cost: 80, market: 200 }
    ]
  },
  food: {
    startMoney: 105000,
    salaryMult: 0.8,
    investLuck: 'high',
    products: []
  }
};

const INVESTMENT_DEFS = [
  { name: 'Retail Chain',      cost: 10000, chance: 0.6,  reward: 1.5 },
  { name: 'Energy Company',    cost: 15000, chance: 0.5,  reward: 2.0 },
  { name: 'Game Studio',       cost: 12000, chance: 0.55, reward: 1.8 },
  { name: 'Transport Company', cost: 8000,  chance: 0.7,  reward: 1.4 }
];

// ============================================================
// PRODUCT / FOOD HELPERS
// ============================================================
function randomPopularity(isFood, isClothing) {
  let pop = Math.floor(Math.random() * 61) + 40;
  if (isFood)     pop += 20;
  if (isClothing) pop += 10;
  return Math.min(pop, 100);
}

function foodCost(type, luxury) {
  const costs = {
    main:    { cheap: 6,  normal: 8,  luxury: 10 },
    side:    { cheap: 1,  normal: 2,  luxury: 3  },
    starter: { cheap: 2,  normal: 3,  luxury: 5  },
    dessert: { cheap: 1,  normal: 2,  luxury: 4  }
  };
  return costs[type][luxury];
}

// ============================================================
// EMPLOYEE / FACILITY HELPERS
// ============================================================
function createEmployee() {
  const def = BUSINESS_DEFS[state.businessType];
  const happiness = Math.floor(Math.random() * 51) + 50;
  const skill     = Math.floor(Math.random() * 51) + 50;
  const salary    = (800 + skill * 15) * def.salaryMult;
  const productivity = skill * happiness / 100;
  return { happiness, skill, salary, productivity };
}

function createFacility() {
  return { level: 1, maxEmployees: 10, employees: [] };
}

function getAvgProductivity() {
  let total = 0, count = 0;
  for (const f of state.facilities) {
    for (const e of f.employees) { total += e.productivity; count++; }
  }
  return count === 0 ? 0 : total / count;
}

function getAvgSkill() {
  let total = 0, count = 0;
  for (const f of state.facilities) {
    for (const e of f.employees) { total += e.skill; count++; }
  }
  return count === 0 ? 0 : total / count;
}

function getTotalSalesCapacity() {
  const avgProd = getAvgProductivity();
  let total = 0;
  for (const f of state.facilities) {
    const levelMult = 1.0 + f.level / 10.0;
    total += Math.floor(f.employees.length * avgProd * levelMult);
  }
  return total;
}

function getTotalSalaries() {
  let total = 0;
  for (const f of state.facilities) {
    for (const e of f.employees) total += e.salary;
  }
  return Math.floor(total);
}

function getTotalEmployees() {
  return state.facilities.reduce((s, f) => s + f.employees.length, 0);
}

// ============================================================
// REVENUE CALCULATION
// ============================================================
function popularityMultiplier() {
  const avgSkill = getAvgSkill();
  if (avgSkill >= 86) return 1.15;
  if (avgSkill >= 66) return 1.10;
  return 1.0;
}

function calcProductRevenue(p) {
  const popMult   = popularityMultiplier();
  const boostedPop = Math.min(100, Math.floor(p.popularity * popMult));
  const demand    = boostedPop / 100;
  const priceAdj  = Math.min(2, Math.max(0.3, p.market / p.chosenPrice));
  let sellRate    = Math.min(1, Math.max(0, demand * priceAdj));
  const capacity  = getTotalSalesCapacity();
  let sold        = Math.min(p.unitsMade, Math.floor(p.unitsMade * sellRate));
  sold            = Math.min(sold, capacity);
  const revenue   = sold * p.chosenPrice;
  const totalCost = p.unitsMade * p.cost;
  p.lastSold    = sold;
  p.lastRevenue = revenue - totalCost;
  return revenue - totalCost;
}

function calcFoodRevenue(f) {
  const capacity    = getTotalSalesCapacity();
  const demanded    = Math.floor(capacity * (f.popularity / 100));
  let sold          = Math.min(f.unitsMade, capacity, demanded);
  const revenue     = sold * f.chosenPrice;
  const totalCost   = f.unitsMade * f.cost;
  f.lastSold      = sold;
  f.lastRevenue   = revenue - totalCost;
  return revenue - totalCost;
}

function calcInvestmentRevenue(inv) {
  if (!inv.active) return 0;
  const luckMap = { high: 1.3, medium: 1.0, low: 0.7 };
  const luck    = luckMap[BUSINESS_DEFS[state.businessType].investLuck];
  let chance    = Math.min(1, inv.chance * luck);
  const roll    = Math.random();
  if (roll <= chance) {
    inv.lastResult = Math.floor(inv.cost * inv.reward);
    inv.lastWin    = true;
  } else {
    inv.lastResult = -Math.floor(inv.cost * 0.5);
    inv.lastWin    = false;
  }
  return inv.lastResult;
}

// ============================================================
// START / SETUP
// ============================================================
let selectedBusinessType = '';

function selectType(type, btn) {
  selectedBusinessType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function startGame() {
  const name = document.getElementById('company-name').value.trim();
  const err  = document.getElementById('start-error');

  if (!selectedBusinessType) { err.textContent = 'Please select a business type.'; return; }
  if (!name)                 { err.textContent = 'Please enter a company name.';   return; }

  newGame();
  state.businessType = selectedBusinessType;
  state.companyName  = name;

  const def = BUSINESS_DEFS[state.businessType];
  state.money = def.startMoney;

  // Give starting facility
  state.facilities.push(createFacility());
  state.money -= 5000;

  // Set up available products (tech/clothing)
  if (state.businessType !== 'food') {
    state.availableProducts = def.products.map(p => ({
      ...p,
      launched: false,
      popularity: randomPopularity(false, state.businessType === 'clothing'),
      unitsMade: 0, chosenPrice: p.market, lastSold: 0, lastRevenue: 0
    }));
  } else {
    state.availableProducts = [];
  }

  // Investments
  state.investmentDefs = INVESTMENT_DEFS.map(i => ({
    ...i, active: false, lastResult: 0, lastWin: false
  }));

  goToMenu();
}

// ============================================================
// SCREEN NAVIGATION
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');

  if (name === 'launch')      buildLaunchScreen();
  if (name === 'hire')        buildHireScreen();
  if (name === 'buyfacility') buildBuyFacilityScreen();
  if (name === 'upgrade')     buildUpgradeScreen();
  if (name === 'invest')      buildInvestScreen();
  if (name === 'endturn')     buildEndTurnScreen();
}

function goToMenu() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-menu').classList.add('active');
  updateStatsBar();
}

function updateStatsBar() {
  document.getElementById('menu-company-name').textContent = state.companyName;
  document.getElementById('turn-label').textContent = 'Turn ' + state.turn;

  const activeCount = state.businessType === 'food'
    ? state.activeProducts.length
    : (state.availableProducts || []).filter(p => p.launched).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-label">Money</span><span class="stat-value money">£${Math.floor(state.money).toLocaleString()}</span></div>
    <div class="stat"><span class="stat-label">Employees</span><span class="stat-value">${getTotalEmployees()}</span></div>
    <div class="stat"><span class="stat-label">Facilities</span><span class="stat-value">${state.facilities.length}</span></div>
    <div class="stat"><span class="stat-label">Products</span><span class="stat-value">${activeCount}</span></div>
    <div class="stat"><span class="stat-label">Sales capacity</span><span class="stat-value">${getTotalSalesCapacity()}</span></div>
  `;
}

// ============================================================
// LAUNCH SCREEN
// ============================================================
function buildLaunchScreen() {
  const div = document.getElementById('launch-content');

  if (state.businessType === 'food') {
    div.innerHTML = `
      <label>Food name:</label>
      <input type="text" id="food-name" placeholder="e.g. Cheeseburger">
      <label>Type:</label>
      <select id="food-type">
        <option value="main">Main</option>
        <option value="side">Side</option>
        <option value="starter">Starter</option>
        <option value="dessert">Dessert</option>
      </select>
      <label>Luxury level:</label>
      <select id="food-luxury">
        <option value="cheap">Cheap</option>
        <option value="normal">Normal</option>
        <option value="luxury">Luxury</option>
      </select>
      <div id="launch-error" class="error"></div>
      <button class="btn btn-green btn-full" onclick="launchFood()">Add to Menu</button>
    `;
  } else {
    let html = '';
    for (let i = 0; i < state.availableProducts.length; i++) {
      const p = state.availableProducts[i];
      const badge = p.launched ? '<span class="badge">LAUNCHED</span>' : '';
      const btn   = p.launched ? '' :
        `<button class="btn btn-green" onclick="launchProduct(${i})">Launch</button>`;
      html += `
        <div class="card">
          <div class="card-info">
            <strong>${p.name}</strong> ${badge}<br>
            Cost to make: £${p.cost} &nbsp;|&nbsp; Market price: £${p.market}
          </div>
          ${btn}
        </div>`;
    }
    div.innerHTML = html;
  }
}

function launchProduct(i) {
  state.availableProducts[i].launched = true;
  buildLaunchScreen();
}

function launchFood() {
  const name   = document.getElementById('food-name').value.trim();
  const type   = document.getElementById('food-type').value;
  const luxury = document.getElementById('food-luxury').value;
  if (!name) { document.getElementById('launch-error').textContent = 'Please enter a food name.'; return; }

  const cost = foodCost(type, luxury);
  const pop  = randomPopularity(true, false);
  state.activeProducts.push({
    name, type, luxury, cost,
    popularity: pop,
    unitsMade: 0, chosenPrice: Math.floor(cost * 2.5),
    lastSold: 0, lastRevenue: 0
  });
  goToMenu();
}

// ============================================================
// HIRE SCREEN
// ============================================================
function buildHireScreen() {
  const div = document.getElementById('hire-content');
  if (state.facilities.length === 0) {
    div.innerHTML = '<p style="color:#f77">No facilities. Buy a facility first.</p>';
    return;
  }

  let html = '';
  for (let i = 0; i < state.facilities.length; i++) {
    const f    = state.facilities[i];
    const free = f.maxEmployees - f.employees.length;
    html += `
      <div class="card" style="flex-direction:column; align-items:flex-start;">
        <div class="card-info">
          <strong>Facility ${i+1}</strong> — Level ${f.level} &nbsp;|&nbsp;
          Employees: ${f.employees.length}/${f.maxEmployees} &nbsp;|&nbsp; Free slots: ${free}
        </div>
        ${free > 0 ? `
          <div style="display:flex; gap:12px; align-items:center; margin-top:8px; flex-wrap:wrap;">
            <label style="margin:0;">Hire:</label>
            <input type="number" id="hire-num-${i}" value="1" min="1" max="${free}"
              style="width:80px; margin:0;" onchange="updateHireCost(${i})">
            <span id="hire-cost-${i}" style="color:#aad4ff; font-size:14px;">
              Est. cost/turn: £${Math.floor((800 + 75*15) * BUSINESS_DEFS[state.businessType].salaryMult)}
            </span>
            <button class="btn btn-green" onclick="hireEmployees(${i})">Confirm</button>
          </div>` : '<span style="color:#f77; font-size:13px;">Full</span>'}
      </div>`;
  }
  div.innerHTML = html;
}

function updateHireCost(i) {
  const num  = parseInt(document.getElementById('hire-num-' + i).value) || 1;
  const each = Math.floor((800 + 75*15) * BUSINESS_DEFS[state.businessType].salaryMult);
  document.getElementById('hire-cost-' + i).textContent = `Est. cost/turn: £${(each * num).toLocaleString()}`;
}

function hireEmployees(facilityIndex) {
  const f   = state.facilities[facilityIndex];
  const num = parseInt(document.getElementById('hire-num-' + facilityIndex).value) || 1;
  const free = f.maxEmployees - f.employees.length;
  const toHire = Math.min(num, free);
  for (let i = 0; i < toHire; i++) f.employees.push(createEmployee());
  goToMenu();
}

// ============================================================
// BUY FACILITY SCREEN
// ============================================================
function buildBuyFacilityScreen() {
  const canAfford = state.money >= 5000;
  document.getElementById('buyfacility-content').innerHTML = `
    <div class="card" style="flex-direction:column; align-items:flex-start; gap:6px;">
      <div class="card-info">
        Cost: <strong>£5,000</strong><br>
        Your money: <strong style="color:#ffd700">£${Math.floor(state.money).toLocaleString()}</strong><br>
        Current facilities: <strong>${state.facilities.length}</strong><br>
        <span style="color:#aaa; font-size:13px;">Starts at level 1, holds up to 10 employees.</span>
      </div>
    </div>
    <button class="btn btn-green btn-full" onclick="buyFacility()" ${canAfford ? '' : 'disabled'}>
      ${canAfford ? 'Buy Facility (£5,000)' : 'Not enough money'}
    </button>
  `;
}

function buyFacility() {
  if (state.money < 5000) return;
  state.money -= 5000;
  state.facilities.push(createFacility());
  goToMenu();
}

// ============================================================
// UPGRADE SCREEN
// ============================================================
function buildUpgradeScreen() {
  const div = document.getElementById('upgrade-content');
  let html = '';
  for (let i = 0; i < state.facilities.length; i++) {
    const f       = state.facilities[i];
    const maxed   = f.level >= 10;
    const canAfford = state.money >= 10000;
    const btnHtml = maxed
      ? '<span class="badge">MAX LEVEL</span>'
      : canAfford
        ? `<button class="btn btn-blue" onclick="upgradeFacility(${i})">Upgrade → Level ${f.level+1}</button>`
        : '<span class="badge badge-red">Not enough money</span>';
    html += `
      <div class="card">
        <div class="card-info">
          <strong>Facility ${i+1}</strong><br>
          Level: ${f.level}/10 &nbsp;|&nbsp; Employees: ${f.employees.length}/${f.maxEmployees}
        </div>
        ${btnHtml}
      </div>`;
  }
  div.innerHTML = html;
}

function upgradeFacility(i) {
  if (state.money < 10000 || state.facilities[i].level >= 10) return;
  state.money -= 10000;
  state.facilities[i].level++;
  state.facilities[i].maxEmployees += 5;
  goToMenu();
}

// ============================================================
// INVEST SCREEN
// ============================================================
function buildInvestScreen() {
  const div = document.getElementById('invest-content');
  let html = '';
  for (let i = 0; i < state.investmentDefs.length; i++) {
    const inv = state.investmentDefs[i];
    const canAfford = state.money >= inv.cost;
    const btnHtml = inv.active
      ? '<span class="badge">INVESTED</span>'
      : canAfford
        ? `<button class="btn btn-green" onclick="invest(${i})">Invest</button>`
        : '<span class="badge badge-red">Need £' + inv.cost.toLocaleString() + '</span>';
    html += `
      <div class="card">
        <div class="card-info">
          <strong>${inv.name}</strong><br>
          Cost: £${inv.cost.toLocaleString()} &nbsp;|&nbsp; Success chance: ${Math.floor(inv.chance*100)}%
        </div>
        ${btnHtml}
      </div>`;
  }
  div.innerHTML = html;
}

function invest(i) {
  const inv = state.investmentDefs[i];
  if (state.money < inv.cost || inv.active) return;
  state.money -= inv.cost;
  inv.active = true;
  buildInvestScreen();
}

// ============================================================
// END TURN SCREEN
// ============================================================
function buildEndTurnScreen() {
  document.getElementById('endturn-title').textContent = 'Set Production — Turn ' + state.turn;
  const div = document.getElementById('endturn-content');
  const capacity = getTotalSalesCapacity();

  const products = state.businessType === 'food'
    ? state.activeProducts
    : (state.availableProducts || []).filter(p => p.launched);

  if (products.length === 0) {
    div.innerHTML = `
      <p style="color:#f77; margin-bottom:16px;">No products launched yet. Go back and launch one first.</p>
      <button class="btn btn-grey btn-full" onclick="goToMenu()">Back to Menu</button>`;
    return;
  }

  let html = `<p style="color:#aad4ff; margin-bottom:14px; font-size:14px;">Sales capacity this turn: <strong>${capacity}</strong> units</p>`;

  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    const recPrice = state.businessType === 'food'
      ? Math.floor(p.cost * 2.5)
      : p.market;
    const forecastSales = state.businessType === 'food'
      ? Math.floor(capacity * p.popularity / 100)
      : Math.floor((capacity / products.length) * (p.popularity / 100));

    html += `
      <div class="prod-row">
        <h3>${p.name} — Popularity: ${p.popularity}/100</h3>
        <p style="color:#aaa; font-size:13px; margin-bottom:10px;">
          Production cost: £${p.cost} &nbsp;|&nbsp; Recommended price: £${recPrice} &nbsp;|&nbsp; Forecast sales: ~${forecastSales}
        </p>
        <div class="prod-inputs">
          <div>
            <label>Units to produce:</label>
            <input type="number" id="units-${i}" value="${Math.max(forecastSales, 1)}" min="0">
          </div>
          <div>
            <label>Selling price: £</label>
            <input type="number" id="price-${i}" value="${recPrice}" min="1">
          </div>
        </div>
      </div>`;
  }

  html += `
    <button class="btn btn-orange btn-full" onclick="confirmProduction()">Confirm Production & End Turn</button>
    <button class="btn btn-grey btn-full" style="margin-top:8px;" onclick="goToMenu()">Back to Menu</button>`;

  div.innerHTML = html;
}

function confirmProduction() {
  const products = state.businessType === 'food'
    ? state.activeProducts
    : (state.availableProducts || []).filter(p => p.launched);

  for (let i = 0; i < products.length; i++) {
    products[i].unitsMade   = parseInt(document.getElementById('units-' + i).value) || 0;
    products[i].chosenPrice = parseInt(document.getElementById('price-' + i).value) || 1;
  }

  runEndTurn(products);
}

function runEndTurn(products) {
  let productRevenue    = 0;
  let investmentRevenue = 0;

  for (const p of products) {
    productRevenue += state.businessType === 'food'
      ? calcFoodRevenue(p)
      : calcProductRevenue(p);
  }

  for (const inv of state.investmentDefs) {
    investmentRevenue += calcInvestmentRevenue(inv);
  }

  const salaries = getTotalSalaries();
  const net      = productRevenue + investmentRevenue - salaries;
  state.money   += net;

  showSummary(products, productRevenue, investmentRevenue, salaries, net);
}

function showSummary(products, productRevenue, investmentRevenue, salaries, net) {
  document.getElementById('endturn-title').textContent = 'Turn ' + state.turn + ' Summary';

  let prodRows = '';
  for (const p of products) {
    prodRows += `<div class="summary-row"><span>${p.name}</span><span>Sold: ${p.lastSold} | £${p.lastRevenue >= 0 ? '+' : ''}${Math.floor(p.lastRevenue).toLocaleString()}</span></div>`;
  }

  let invRows = '';
  for (const inv of state.investmentDefs) {
    if (!inv.active) continue;
    const cls = inv.lastWin ? 'positive' : 'negative';
    invRows += `<div class="summary-row ${cls}"><span>${inv.name}</span><span>${inv.lastWin ? '+' : ''}£${inv.lastResult.toLocaleString()}</span></div>`;
  }

  const netClass = net >= 0 ? 'positive' : 'negative';

  document.getElementById('endturn-content').innerHTML = `
    <div class="summary-box">
      <p style="color:#aaa; font-size:13px; margin-bottom:8px;">Products</p>
      ${prodRows}
      ${invRows ? `<p style="color:#aaa; font-size:13px; margin: 10px 0 4px;">Investments</p>${invRows}` : ''}
      <div class="summary-row" style="margin-top:10px;"><span>Product revenue</span><span style="color:#5d5">+£${Math.floor(productRevenue).toLocaleString()}</span></div>
      <div class="summary-row"><span>Investment revenue</span><span style="color:${investmentRevenue >= 0 ? '#5d5' : '#f77'}">£${Math.floor(investmentRevenue).toLocaleString()}</span></div>
      <div class="summary-row"><span>Salaries</span><span style="color:#f77">-£${salaries.toLocaleString()}</span></div>
      <div class="summary-row total"><span>Net this turn</span><span class="${netClass}">£${net >= 0 ? '+' : ''}${Math.floor(net).toLocaleString()}</span></div>
      <div class="summary-row total"><span>Balance</span><span style="color:#ffd700">£${Math.floor(state.money).toLocaleString()}</span></div>
    </div>
    <button class="btn btn-green btn-full" onclick="nextTurn()">Next Turn →</button>
  `;
}

function nextTurn() {
  state.turn++;
  if (state.money < 0)         { showGameOver(false); return; }
  if (state.money >= 1000000)  { showGameOver(true);  return; }
  goToMenu();
}

// ============================================================
// GAME OVER
// ============================================================
function showGameOver(won) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-gameover').classList.add('active');

  document.getElementById('gameover-content').innerHTML = `
    <div class="gameover-box ${won ? 'win' : 'lose'}">
      <h1>${won ? 'You Win!' : 'Bankrupt!'}</h1>
      <p style="font-size:17px; color:#ddd;">
        ${won
          ? 'Congratulations! You reached £1,000,000!'
          : 'Your company ran out of money on turn ' + state.turn + '.'}
      </p>
      <div class="gameover-stats">
        Final balance: £${Math.floor(state.money).toLocaleString()}<br>
        Turns played: ${state.turn}<br>
        Employees at close: ${getTotalEmployees()}
      </div>
      <button class="btn btn-green btn-full" onclick="resetGame()">Play Again</button>
    </div>
  `;
}

function resetGame() {
  selectedBusinessType = '';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('company-name').value = '';
  document.getElementById('start-error').textContent = '';
  showScreen('start');
}
</script>
</body>
</html>
